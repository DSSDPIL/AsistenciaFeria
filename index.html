<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lector QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

    <h2>Escanea tu código QR</h2>

    <div id="reader" style="width:300px;"></div>

    <p id="idLeido"></p>
    <p id="resultado"></p>

    <script>

        const html5QrCode = new Html5Qrcode("reader");
        const idLeido = document.getElementById("idLeido");
        const resultado = document.getElementById("resultado");

        function registrarAsistencia(idAsistente) {

            const url = "https://script.google.com/macros/s/AKfycbxhcl4YaK4vfnkCfwp5R-YimbZQrLUONmPWZBGdZffG2FATHoMx5zfogfPUbgTwY1Lj/exec?id=" 
                        + encodeURIComponent(idAsistente);

            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            iframe.src = url;
            document.body.appendChild(iframe);

            resultado.innerHTML = "Registro enviado";
        }

        function onScanSuccess(decodedText) {

            idLeido.innerHTML = "ID leído: " + decodedText;

            registrarAsistencia(decodedText);

            html5QrCode.stop().then(() => {
                setTimeout(() => {
                    iniciarCamara();
                }, 1000);
            });
        }

        function iniciarCamara() {
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: 250 },
                onScanSuccess
            );
        }

        iniciarCamara();

    </script>

</body>
</html>
