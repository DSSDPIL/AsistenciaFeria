<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lector QR - Feria 2026</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 30px;
        }

        #reader {
            width: 300px;
            margin: auto;
        }

        #resultado {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }

        #idLeido {
            margin-top: 10px;
            font-size: 16px;
            color: #444;
        }
    </style>
</head>

<body>

    <h2>Escanea tu código QR</h2>

    <div id="reader"></div>

    <div id="idLeido"></div>
    <div id="resultado"></div>

    <script>

        const readerDiv = document.getElementById("reader");
        const resultado = document.getElementById("resultado");
        const idLeido = document.getElementById("idLeido");

        const html5QrCode = new Html5Qrcode("reader");

        function registrarAsistencia(idAsistente) {

            const url = "https://script.google.com/macros/s/AKfycbxhcl4YaK4vfnkCfwp5R-YimbZQrLUONmPWZBGdZffG2FATHoMx5zfogfPUbgTwY1Lj/exec?id=" 
                        + encodeURIComponent(idAsistente);

            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            iframe.src = url;
            document.body.appendChild(iframe);

            resultado.innerHTML = "✅ Registro enviado";
            resultado.style.color = "green";
        }

        function onScanSuccess(decodedText) {

            // Mostrar ID escaneado
            idLeido.innerHTML = "ID leído: <b>" + decodedText + "</b>";

            // Registrar asistencia
            registrarAsistencia(decodedText);

            // Pequeña pausa antes de volver a escanear
            html5QrCode.stop().then(() => {
                setTimeout(iniciarCamara, 1500);
            });
        }

        function iniciarCamara() {
            html5QrCode.start(
                { facingMode: "environment" }, // Cámara trasera automática
                {
                    fps: 10,
                    qrbox: 250
                },
                onScanSuccess
            );
        }

        // Iniciar automáticamente
        iniciarCamara();

    </script>

</body>
</html>
