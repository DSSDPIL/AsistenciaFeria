<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lector QR - Feria 2026</title>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        h2 {
            margin-top: 20px;
        }

        #reader {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }

        #idLeido {
            font-size: 22px;
            margin-top: 15px;
        }

        #resultado {
            font-size: 26px;
            font-weight: bold;
            margin-top: 10px;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

    <h2>Escanea el código QR</h2>

    <div id="reader"></div>

    <div class="box">
        <div id="idLeido">Esperando lectura...</div>
        <div id="resultado"></div>
    </div>

    <script>

        const html5QrCode = new Html5Qrcode("reader");
        const idLeido = document.getElementById("idLeido");
        const resultado = document.getElementById("resultado");

        function registrarAsistencia(idAsistente) {

            const url = "https://script.google.com/macros/s/AKfycbxhcl4YaK4vfnkCfwp5R-YimbZQrLUONmPWZBGdZffG2FATHoMx5zfogfPUbgTwY1Lj/exec?id=" 
                        + encodeURIComponent(idAsistente);

            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            iframe.src = url;
            document.body.appendChild(iframe);

            resultado.innerHTML = "✅ Registro enviado";
            resultado.style.color = "green";
        }

        function onScanSuccess(decodedText) {

            idLeido.innerHTML = "ID leído: <strong>" + decodedText + "</strong>";
            resultado.innerHTML = "";

            registrarAsistencia(decodedText);

            html5QrCode.stop().then(() => {
                setTimeout(() => {
                    iniciarCamara();
                }, 1200);
            });
        }

        function iniciarCamara() {
            html5QrCode.start(
                { facingMode: { exact: "environment" } }, // Fuerza cámara trasera
                {
                    fps: 12,
                    qrbox: { width: 280, height: 280 }
                },
                onScanSuccess
            ).catch(err => {
                idLeido.innerHTML = "Permite el acceso a la cámara para continuar.";
            });
        }

        // Inicia apenas carga la página
        window.onload = function() {
            iniciarCamara();
        };

    </script>

</body>
</html>
