<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lector QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>Escanea tu código QR</h2>

<div id="reader" style="width:300px;"></div>

<p id="mensaje"></p>

<script>

const html5QrCode = new Html5Qrcode("reader");
const mensaje = document.getElementById("mensaje");

// 🔴 PEGA AQUÍ TU NUEVA URL /exec
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw4HEJn1Vu7_pFNaR-xzV5Gnvv_t0tuaUtliakithn16k-Vm3FzT54zSOgIRh-HPvs/exec";

function registrarAsistencia(id) {

    mensaje.innerHTML = "ID leído: " + id + "<br>Registrando...";

    const url = WEB_APP_URL + "?id=" + encodeURIComponent(id);

    fetch(url)
        .then(response => response.text())
        .then(data => {
            mensaje.innerHTML = "ID leído: " + id + "<br>" + data;
        })
        .catch(() => {
            mensaje.innerHTML = "Error al conectar con el servidor";
        });
}

function onScanSuccess(decodedText) {

    html5QrCode.stop().then(() => {

        registrarAsistencia(decodedText);

        setTimeout(() => {
            iniciar();
        }, 2000);

    });
}

function iniciar() {
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
    );
}

iniciar();

</script>

</body>
</html>
