<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lector QR</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>Escanea tu código QR</h2>

<div id="reader" style="width:300px;"></div>

<p id="mensaje"></p>

<script>

const html5QrCode = new Html5Qrcode("reader");
const mensaje = document.getElementById("mensaje");

function registrarAsistencia(id) {

    const url = "https://script.google.com/macros/s/AKfycbxhcl4YaK4vfnkCfwp5R-YimbZQrLUONmPWZBGdZffG2FATHoMx5zfogfPUbgTwY1Lj/exec?id=" + encodeURIComponent(id);

    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = url;
    document.body.appendChild(iframe);

    mensaje.innerHTML = "ID leído: " + id;
}

function onScanSuccess(decodedText) {

    registrarAsistencia(decodedText);

    html5QrCode.stop().then(() => {
        setTimeout(() => {
            iniciar();
        }, 1000);
    });
}

function iniciar() {
    html5QrCode.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
    );
}

iniciar();

</script>

</body>
</html>
