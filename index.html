<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lector QR - Feria 2026</title>

    <!-- Librería del lector QR -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 30px;
        }

        #reader {
            width: 300px;
            margin: auto;
        }

        #resultado {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Escanea tu código QR</h2>

    <div id="reader"></div>

    <div id="resultado"></div>

    <script>

        function registrarAsistencia(idAsistente) {

            const resultado = document.getElementById("resultado");

            if (!idAsistente) {
                resultado.innerHTML = "❌ Código inválido";
                resultado.style.color = "red";
                return;
            }

            const url = "https://script.google.com/macros/s/AKfycbxhcl4YaK4vfnkCfwp5R-YimbZQrLUONmPWZBGdZffG2FATHoMx5zfogfPUbgTwY1Lj/exec?id=" 
                        + encodeURIComponent(idAsistente);

            // Enviar sin abrir pestaña (iframe oculto)
            const iframe = document.createElement("iframe");
            iframe.style.display = "none";
            iframe.src = url;
            document.body.appendChild(iframe);

            resultado.innerHTML = "✅ Registro enviado";
            resultado.style.color = "green";
        }


        function onScanSuccess(decodedText) {
            registrarAsistencia(decodedText);
        }

        function onScanFailure(error) {
            // Solo ignora errores de lectura
        }

        const html5QrCodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 10, qrbox: 250 },
            false
        );

        html5QrCodeScanner.render(onScanSuccess);

    </script>

</body>
</html>
