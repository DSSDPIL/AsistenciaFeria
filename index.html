<script>
function registrarAsistencia(idAsistente) {

    const resultado = document.getElementById("resultado");

    if (!idAsistente) {
        resultado.innerHTML = "❌ Código inválido";
        resultado.style.color = "red";
        return;
    }

    const url = "https://script.google.com/macros/s/AKfycbxhcl4YaK4vfnkCfwp5R-YimbZQrLUONmPWZBGdZffG2FATHoMx5zfogfPUbgTwY1Lj/exec?id=" 
                + encodeURIComponent(idAsistente);

    // Crear iframe oculto
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = url;
    document.body.appendChild(iframe);

    // Mostrar resultado visual inmediato
    resultado.innerHTML = "✅ Registro enviado";
    resultado.style.color = "green";
}

function onScanSuccess(decodedText) {
    registrarAsistencia(decodedText);
}

const html5QrCodeScanner = new Html5QrcodeScanner(
    "reader",
    { fps: 10, qrbox: 250 },
    false
);
html5QrCodeScanner.render(onScanSuccess);
</script>
